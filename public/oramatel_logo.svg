<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <!-- Background is transparent for versatility -->

    <!-- Gradient for the O lettermark -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#84BDFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90D9;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for nodes -->
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#84BDFF;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- ─── SYMBOL: Stylised "O" with network arc motif ─── -->

  <!-- Outer ring (partial arc — open at bottom-right to suggest forward motion) -->
  <circle cx="60" cy="60" r="44" fill="none" stroke="url(#arcGrad)" stroke-width="6"
    stroke-linecap="round"
    stroke-dasharray="230 47" />

  <!-- Inner partial ring — creates depth / layering -->
  <circle cx="60" cy="60" r="30" fill="none" stroke="#84BDFF" stroke-width="3"
    stroke-opacity="0.45"
    stroke-dasharray="155 34" />

  <!-- Network node — centre hub -->
  <circle cx="60" cy="60" r="7" fill="url(#arcGrad)" />

  <!-- Three spoke lines radiating outward to satellite nodes -->
  <!-- Top-right spoke -->
  <line x1="64" y1="54" x2="84" y2="30" stroke="#84BDFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.85"/>
  <circle cx="86" cy="27" r="4" fill="#84BDFF" />

  <!-- Right spoke -->
  <line x1="67" y1="60" x2="92" y2="60" stroke="#84BDFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.85"/>
  <circle cx="95" cy="60" r="4" fill="#4A90D9" />

  <!-- Bottom-left spoke -->
  <line x1="55" y1="65" x2="36" y2="87" stroke="#84BDFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.70"/>
  <circle cx="33" cy="90" r="3.5" fill="#84BDFF" stroke="#4A90D9" stroke-width="1.2" />

  <!-- ─── WORDMARK ─── -->

  <!-- "Oramatel" — Inter ExtraBold approximation via SVG text -->
  <text
    x="128"
    y="72"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="44"
    letter-spacing="-1"
    fill="#FFFFFF">Oramatel</text>

  <!-- Accent rule under wordmark — matches brand colour -->
  <rect x="128" y="82" width="270" height="3" rx="1.5" fill="url(#arcGrad)" opacity="0.7" />

  <!-- Tagline / descriptor — lighter weight -->
  <text
    x="130"
    y="101"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="500"
    font-size="13"
    letter-spacing="2.5"
    fill="#84BDFF"
    opacity="0.9">NETWORK CONSULTING</text>
</svg>
